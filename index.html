<style>

*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:var(--blue);text-decoration:none;cursor:pointer}

.ndd.open{display:block}

h1.pg{font-size:21px;font-weight:800;letter-spacing:-.3px;margin-bottom:3px}

table{width:100%;border-collapse:collapse;font-size:12.5px}

.arr{display:flex;align-items:center;color:var(--mut);font-size:15px}

.dep{border:1px solid var(--line);border-left-width:3px;border-radius:9px;padding:9px 12px;margin-bottom:8px}

.login{position:fixed;inset:0;z-index:100;background:linear-gradient(135deg,#101826,#1b2e47 60%,#1b4e8e);display:flex;align-items:center;justify-content:center;padding:20px}

  h+='<div class="card"><div class="card-h"><h2>После сдачи — следующие отделы</h2></div><div class="card-b"><div class="flow"><div class="mscard done"><div class="nm">Отдел GR</div><div class="su">земля → техпаспорта</div></div><div class="arr">→</div><div class="mscard"><div class="nm">КСК / Atamura Comfort</div><div class="su">эксплуатация, передача жителям</div></div><div class="arr">→</div><div class="mscard"><div class="nm">Жители / дольщики</div><div class="su">заселение, обслуживание</div></div></div></div></div>';

}
/* ===== ОКНО ЗАДАЧИ ===== */
let TCOM={};const STC=['idle','prog','wait','done'];
function openTask(id){const t=TASKS[id];const can=!ROLES[ME.r].ro||['owner'].includes(ME.r);const isResp=t.who===ME.r;const adv=(!ROLES[ME.r].ro)&&(isResp||MGMT.includes(ME.r))&&t.st!=='done';
  const appr=['owner','grhead','grexec','coordinator'].includes(ME.r);const key=t.fid||('seed:'+id);const coms=TCOM[key]||[];const att=ups(900+id,'task');
  let b='<div class="m-h"><div><div class="t">'+t.name+'</div><div class="s">📁 '+t.proj+' · '+t.dept+' · 👤 '+t.exec+(t.by?' · ✍ '+t.by:'')+'</div></div><button class="x" onclick="cl(\'mbg\')">×</button></div><div class="m-b">';
  b+='<div class="row">'+badge(t.st)+'<span class="pill">Шаг '+t.step+' · '+STEPS[t.step-1][0]+'</span>'+(adv?'<button class="btn pri sm" onclick="advTask('+id+')">Перевести статус →</button>':'')+'</div>';
  b+='<h4>Вложения ('+att.length+')</h4>'+(att.length?att.map(f=>'<div class="doc"><div class="nm">'+f.name+'</div><button class="btn sm" onclick="dlFile(\''+esc(f.name)+'\',\''+f.url+'\')">Скачать</button></div>').join(''):'<div class="hint">Документов пока нет.</div>');
  if(!ROLES[ME.r].ro)b+='<div style="margin-top:8px"><button class="btn" onclick="pickUpload('+(900+id)+',\'task\')">📎 Прикрепить документ</button></div>';
  if(appr)b+='<h4>Согласование</h4><div class="row"><button class="btn grn sm" onclick="apprTask('+id+',1)">✓ Согласовать</button><button class="btn sm" style="background:var(--red);border-color:var(--red);color:#fff" onclick="apprTask('+id+',0)">✕ Отклонить</button></div>';
  b+='<h4>Комментарии ('+coms.length+')</h4><div class="coms">'+(coms.length?coms.map(c=>'<div class="com"><b>'+c.w+'</b> <span class="muted">· '+c.tm+'</span><div>'+c.x+'</div></div>').join(''):'<div class="hint">Обсуждение пусто.</div>')+'</div>';
  if(!ROLES[ME.r].ro)b+='<div class="combox"><textarea id="tc" placeholder="Комментарий по статусу… (как в Битриксе)"></textarea><button class="btn pri" onclick="addCom('+id+')">Отправить</button></div>';
  b+='<div class="hint" style="margin-top:10px">📲 Уведомления о действиях падают ответственному ('+t.exec+') и в центр уведомлений 🔔.</div></div>';
  document.getElementById('modal').innerHTML=b;document.getElementById('mbg').classList.add('open');}
function advTask(id){const t=TASKS[id];const i=STC.indexOf(t.st);if(i<0||i>=3)return;const next=STC[i+1];t.st=next;const pr=PROJECTS.find(function(x){return x.id===t.projId});if(pr)pr.st=next;
  if(FB_OK&&t.fid){DB.collection('tasks').doc(t.fid).update({st:next}).catch(function(){});DB.collection('pstatus').doc(String(t.projId)).set({st:next},{merge:true}).catch(function(){});}
  pushN(t.who,t.exec,'Статус задачи: '+STM[next][0],'«'+t.name+'» ('+t.proj+'). '+(next==='done'?'Выполнено.':'Ваше действие: отпишитесь или приложите документ.'),t.proj,null);
  openTask(id);render();}
function addCom(id){const e=document.getElementById('tc');if(!e)return;const v=(e.value||'').trim();if(!v)return;const me=curName().split(' ')[0];const t=TASKS[id];const key=t.fid||('seed:'+id);if(FB_OK){DB.collection('tcom').add({key:key,w:me,x:v,tm:'сейчас',cr:Date.now()}).catch(function(){});}else{(TCOM[key]=TCOM[key]||[]).push({w:me,x:v,tm:'сейчас'});}pushN(t.who,t.exec,'Новый комментарий',me+' по задаче «'+t.name+'».',t.proj,null);openTask(id);}
function apprTask(id,ok){const t=TASKS[id];const key=t.fid||('seed:'+id);const txt=ok?'✅ Согласовано':'❌ Отклонено — на доработку';if(FB_OK){DB.collection('tcom').add({key:key,w:ROLES[ME.r].nm,x:txt,tm:'сейчас',cr:Date.now()}).catch(function(){});}else{(TCOM[key]=TCOM[key]||[]).push({w:ROLES[ME.r].nm,x:txt,tm:'сейчас'});}pushN(t.who,t.exec,ok?'Согласовано':'Отклонено',ROLES[ME.r].nm+(ok?' согласовал(а) ':' отклонил(а) ')+'«'+t.name+'».',t.proj,null);openTask(id);}

function searchP(q){const d=document.getElementById('sdd');q=(q||'').trim().toLowerCase();if(!q){d.classList.remove('open');return;}
  const r=PROJECTS.filter(p=>p.n.toLowerCase().includes(q)).slice(0,8);
  d.innerHTML=r.length?r.map(p=>'<a onmousedown="openProj('+p.id+');document.getElementById(\'sIn\').value=\'\'">'+p.n+'<span>Шаг '+p.s+' · '+STEPS[p.s-1][0]+' · 👤 '+p.lead+'</span></a>').join(''):'<a class="muted">Ничего не найдено</a>';
  d.classList.add('open');}

let view='home';

let PCOM={};
function canLead(){return ['owner','ceo'].includes(ME.r);}
function askLead(pid){if(!canLead())return;const v=prompt('Вопрос / замечание ответственному по проекту «'+P(pid).n+'»:');if(v&&v.trim())addLead(pid,v.trim());}
function addLead(pid,v){const p=P(pid);if(FB_OK){DB.collection('pcom').add({pid:pid,who:curName(),x:v,tm:'сейчас',cr:Date.now()}).catch(function(){});}else{(PCOM[pid]=PCOM[pid]||[]).push({who:curName(),x:v,tm:'сейчас'});}
  pushN(leadRole(p.lead),p.lead,'Замечание руководства','«'+v+'» — '+p.n+' (от '+curName().split(' ')[0]+'). Учтите / ответьте.',p.n,null);
  render();}
function leadBlock(pid){const c=PCOM[pid]||[];let h='<div class="card"><div class="card-h"><h2>💬 Замечания руководства (CEO / учредитель)</h2><span class="r">'+c.length+'</span></div><div class="card-b">';
  h+=(c.length?'<div class="coms">'+c.map(x=>'<div class="com"><b>'+x.who+'</b> <span class="muted">· '+x.tm+'</span><div>'+x.x+'</div></div>').join('')+'</div>':'<div class="hint">Пока нет замечаний.</div>');
  if(canLead())h+='<div style="margin-top:10px"><button class="btn pri sm" onclick="askLead('+pid+')">+ Оставить вопрос / замечание</button></div>';
  h+='</div></div>';return h;}
function viewReport(){const lead=canLead();
  let h='<h1 class="pg">Отчёт руководству</h1><div class="sub">Статусы по всем проектам для CEO и учредителя.'+(lead?' Нажмите 💬, чтобы оставить вопрос или замечание — оно уйдёт уведомлением ответственному.':' Руководство видит статусы и оставляет замечания исполнителям (доходят уведомлением).')+'</div>';

  GROUPS.forEach(gr=>{const ps=PROJECTS.filter(p=>p.g===gr[0]);if(!ps.length)return;
    h+='<div class="card"><div class="card-h"><h2>'+gr[0]+'</h2><span class="r">'+ps.length+' · '+gr[1]+'</span></div><table><thead><tr><th>Проект</th><th>Шаг</th><th>Статус</th><th>Ведёт</th><th>Текущее / след. действие</th><th>💬</th></tr></thead><tbody>';

      h+='<tr><td class="b" style="cursor:pointer" onclick="openProj('+p.id+')">'+p.n+'</td><td>Шаг '+p.s+'</td><td>'+badge(p.st)+'</td><td class="muted">'+p.lead+'</td><td style="font-size:12px">'+(p.note||'<span class="muted">—</span>')+'</td><td>'+(lead?'<button class="btn sm" onclick="askLead('+p.id+')">💬'+(c?' '+c:'')+'</button>':(c?'💬 '+c:''))+'</td></tr>';});
    h+='</tbody></table></div>';});
  return h;
}
const NAV=[["home","Главная",'<path d="M3 11l9-7 9 7v9a1 1 0 01-1 1h-5v-6H9v6H4a1 1 0 01-1-1z"/>'],["projects","Проекты",'<path d="M3 21V8l9-5 9 5v13"/><path d="M9 21v-7h6v7"/>'],["docs","Документы",'<path d="M6 2h9l5 5v15H6z"/><path d="M14 2v6h6"/>'],["deps","Связь отделов",'<circle cx="6.5" cy="7" r="2.5"/><circle cx="17.5" cy="7" r="2.5"/><circle cx="12" cy="17" r="2.5"/><path d="M8.5 8.5l3 6M15.5 8.5l-3 6"/>'],["report","Отчёт руководству",'<path d="M4 4h16v16H4z"/><path d="M8 9h7M8 13h5" stroke-linecap="round"/><circle cx="16.5" cy="15.5" r="2.3"/>']];

function renderUser(){const R=ROLES[ME.r];document.getElementById('sbUser').innerHTML='<div class="sb-av">'+ini(curName())+'</div><div style="flex:1;min-width:0"><div class="nm">'+curName().split(' — ')[0]+'</div><div class="rl">'+R.nm+'</div></div><button class="out" onclick="logout()">Выход</button>';}
